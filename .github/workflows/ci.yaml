name: Lint

on:
  pull_request:
    paths:
      - pkg/**
      - cmd/**
      - go.mod
      - .github/workflows/ci.yml

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.25

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: ./
          args: --skip-dirs scan

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.25

      - name: test
        run:
          go test -cover ./...
